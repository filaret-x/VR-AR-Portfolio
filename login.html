<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | VR/AR Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <a href="index.html" class="header-logo">
            <div class="header-logo-icon"><img src="img/иконка.png" alt="Галерея проектов"></div> VR/AR Portfolio
        </a>
        <div class="header-menu">
            <nav class="header-nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="profile.html">Кабинет</a>
            </nav>
            <div class="theme-switcher">
                <button class="theme-button active" data-theme="light">☀️</button>
                <button class="theme-button" data-theme="dark">🌙</button>
            </div>
            <div class="header-auth">
                <a href="login.html" class="active">Вход</a>
                <a href="register.html">Регистрация</a>
            </div>
            <button class="header-burger">☰</button>
        </div>
    </header>
    <main class="auth-page">
        <div class="auth-form">
            <h2 class="auth-title">Вход в аккаунт</h2>
            <form>
                <label>Email</label>
                <input type="email" class="field" required placeholder="user@example.com">
                <div class="error-text">Введите корректный e-mail</div>
                <label>Пароль</label>
                <input type="password" class="field" required placeholder="••••••••">
                <div class="error-text">Минимум 8 символов, цифра</div>
                <a href="#" class="auth-note"
                    style="display:block;text-align:right;margin-bottom:15px;font-size:13px">Забыли пароль?</a>
                <button type="submit" class="button auth-button">Войти</button>
            </form>
            <div class="auth-footer">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-copyright">© 2026 "IT-куб"</div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
